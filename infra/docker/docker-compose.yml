version: "3.9"
services:
  api:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --app-dir apps/api"
    ports:
      - "8000:8000"
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

